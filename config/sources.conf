# 外部技能源配置
# 每行一个来源，字段用 | 分隔：
# id|remote|ref|target_group|layout|slug_mode|group_readme|include
#
# layout:
#   flat    -> upstream/skills/<skill>/SKILL.md
#   grouped -> upstream/skills/<group>/<skill>/SKILL.md
#   auto    -> 自动判断
#
# slug_mode:
#   preserve -> 保留上游目录名
#   prefix   -> 写入为 integ-<id>-<skill>
#
# include 留空表示导入全部技能；多个技能用逗号分隔，例如 xyq-nest-skill,foo-skill
#
# 示例：
# pippit|https://gitee.com/Pippit-dev/pippit-skills.git|master|pippit-skills|flat|preserve|README.md|

pippit|https://gitee.com/Pippit-dev/pippit-skills.git|master|pippit-skills|flat|preserve|README.md|
